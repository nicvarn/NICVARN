<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicvarn Mørkset | Official Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar" id="mainNavbar">
        <div class="menu-toggle" id="menuToggle" onclick="handleMenuClick()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="nav-overlay" id="navOverlay">
        <div class="overlay-content">
            <ul class="nav-links">
                <li><a href="#" onclick="openBiography(event)">BIOGRAPHY</a></li>
                <li><a href="#discography" onclick="handleMenuClick()">ARCHIVE</a></li>
                <li><a href="#store" onclick="handleMenuClick()">SHOP</a></li>
            </ul>
            <div class="menu-sub-logo">
                <img src="logo-menu.png" alt="Nicvarn Mørkset Mini Logo">
            </div>
        </div>
    </div>

    <div class="hero-container" id="heroContainer">
        <img src="logo.png" alt="Nicvarn Mørkset Logo" class="band-logo">
    </div>

    <footer class="streaming-footer" id="streamingFooter">
        <div class="icon-links">
            <a href="https://open.spotify.com/artist/38j0xCdsSETXXoxOqPWfWD?si=5XlD0usXSCqVE5e5Q4esGw" target="_blank" title="Spotify"><i class="fa-brands fa-spotify"></i></a>
            <a href="https://music.apple.com/id/artist/nicvarn-m%C3%B8rkset/1883083358?l=id" target="_blank" title="Apple Music"><i class="fa-brands fa-apple"></i></a>
            <a href="https://nicvarn.bandcamp.com" target="_blank" title="Bandcamp"><i class="fa-brands fa-bandcamp"></i></a>
            <a href="https://youtube.com/@nicvarnmorkset?si=Sgz1TJO2EE6H389S" target="_blank" title="YouTube"><i class="fa-brands fa-youtube"></i></a>
            <a href="https://music.amazon.com/artists/B0GRH96P7F/nicvarn-m%25C3%25B8rkset?marketplaceId=ATVPDKIKX0DER&musicTerritory=US&ref=dm_sh_E4VnadScDmiHQV96ag5UbQEur" target="_blank" title="Amazon Music"><i class="fa-brands fa-amazon"></i></a>
        </div>
    </footer>

    <section id="biographySection" class="bio-page-container">
        <div class="bio-content-wrapper">
            
            <div class="bio-photo-box">
                <img src="foto-profil.jpg" alt="Nicvarn Mørkset" class="bio-profile-img">
            </div>

            <h1 class="bio-artist-name">NICVARN MØRKSET</h1>

            <div class="bio-narrative">
                </div>

            <div class="bio-instagram-links">
                <a href="https://www.instagram.com/nicvarn.morkset/" target="_blank" class="insta-btn-item">
                    <i class="fa-brands fa-instagram"></i>
                    <span>NICVARN</span>
                </a>
                <a href="https://www.instagram.com/zackhell_/" target="_blank" class="insta-btn-item">
                    <i class="fa-brands fa-instagram"></i>
                    <span>ZACKHELL</span>
                </a>
            </div>

        </div>
    </section>

    <script>
        var currentScreen = "home"; 

        function handleMenuClick() {
            var overlay = document.getElementById("navOverlay");
            var toggle = document.getElementById("menuToggle");
            var hero = document.getElementById("heroContainer");
            var footer = document.getElementById("streamingFooter");
            var bioSection = document.getElementById("biographySection");

            // JIKA USER DI HALAMAN BIO: klik tombol X akan mengembalikan murni ke halaman menu overlay
            if (currentScreen === "biography") {
                bioSection.classList.remove("active");
                
                overlay.classList.add("active");
                toggle.classList.add("active");
                
                currentScreen = "home"; 
                return;
            }

            // JIKA USER DI HALAMAN UTAMA (Fungsi asli bawaanmu tanpa modifikasi display)
            overlay.classList.toggle("active");
            toggle.classList.toggle("active");
            
            if(overlay.classList.contains("active")) {
                hero.style.opacity = "0";
                footer.style.opacity = "0";
            } else {
                hero.style.opacity = "1";
                footer.style.opacity = "1";
            }
        }

        function openBiography(e) {
            e.preventDefault();
            var overlay = document.getElementById("navOverlay");
            var toggle = document.getElementById("menuToggle");
            var hero = document.getElementById("heroContainer");
            var footer = document.getElementById("streamingFooter");
            var bioSection = document.getElementById("biographySection");

            // Tutup menu overlay, sembunyikan home lewat opacity bawaan, tombol tetap X silang
            overlay.classList.remove("active");
            hero.style.opacity = "0";
            footer.style.opacity = "0";
            toggle.classList.add("active");

            // Tampilkan halaman bio
            bioSection.classList.add("active");
            window.scrollTo(0, 0);

            currentScreen = "biography";
        }
    </script>

</body>
</html>
