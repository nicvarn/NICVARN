<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicvarn Mørkset | Official Website</title>
    <link rel="stylesheet" href="style.css">
    <!-- Menghubungkan library ikon gratis untuk logo streaming -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- MENU GARIS 3 (POJOK KANAN ATAS) -->
    <nav class="navbar">
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#bio">Biography</a></li>
            <li><a href="#discography">Discography</a></li>
            <li><a href="#store">Store / PO Merch</a></li>
        </ul>
    </nav>

    <!-- LOGO BAND DI TENGAH LAYAR -->
    <div class="hero-container">
        <!-- Pastikan nanti kamu punya file bernama logo.png di folder yang sama -->
        <img src="logo.png" alt="Nicvarn Mørkset Logo" class="band-logo">
    </div>

    <!-- LINK STREAMING DI BAWAH (MURNI IKON) -->
    <footer class="streaming-footer">
        <div class="icon-links">
            <!-- Ganti tanda # dengan link profil streaming-mu nanti -->
            <a href="#" target="_blank" title="Spotify"><i class="fa-brands fa-spotify"></i></a>
            <a href="#" target="_blank" title="Apple Music"><i class="fa-brands fa-apple"></i></a>
            <a href="#" target="_blank" title="Bandcamp"><i class="fa-brands fa-bandcamp"></i></a>
            <a href="#" target="_blank" title="YouTube"><i class="fa-brands fa-youtube"></i></a>
            <a href="#" target="_blank" title="Amazon Music"><i class="fa-brands fa-amazon"></i></a>
        </div>
    </footer>

    <!-- FUNGSI KLIK MENU GARIS 3 -->
    <script>
        function toggleMenu() {
            var navLinks = document.getElementById("navLinks");
            navLinks.classList.toggle("active");
        }
    </script>

</body>
</html>
